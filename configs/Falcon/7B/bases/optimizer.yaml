OptimizerConfig:
  optimizer: AdamW
  lr: 1.0e-04
  betas: [0.9, 0.95]
  eps: 1.0e-08
  weight_decay: 0.1
  optimize_weights:
    black_list: null # don't optimize components in black_list
    white_list: null # optimize only components in white_list
  scheduler:
    name: wsd
    warmup_steps: 0.05
    decay_steps: 0.1
    warmup_start_lr: 0
    min_lr: 1.0e-8
