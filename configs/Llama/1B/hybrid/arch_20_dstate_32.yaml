      attn_layer:
        name:  LlamaAttention
        input:
          num_attention_heads: 3
          attention_bias: false
          head_dim: 64
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072

    ###############################################################################
    #  L9  – heads = [25]     → 1
    ###############################################################################
    - name: DoubleBlockAdapter
      n_layers: 1           # L9
      input:  ${BLOCK_INPUT}
      ssm_layer:
        name:  DiscreteMamba2
        input: ${SSM_INPUT}
      attn_layer:
        name:  LlamaAttention
        input:
          num_attention_heads: 1
          attention_bias: false
          head_dim: 64
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072

    ###############################################################################
    #  L10 – heads = [26, 20, 9] → 3
    ###############################################################################
    - name: DoubleBlockAdapter
      n_layers: 1           # L10
      input:  ${BLOCK_INPUT}
      ssm_layer:
        name:  DiscreteMamba2
        input: ${SSM_INPUT}
      attn_layer:
        name:  LlamaAttention
        input:
          num_attention_heads: 3
          attention_bias: false
          head_dim: 64
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072

    ###############################################################################
    #  L11 – heads = [8]      → 1
    ###############################################################################
    - name: DoubleBlockAdapter
      n_layers: 1           # L11
      input:  ${BLOCK_INPUT}
      ssm_layer:
        name:  DiscreteMamba2
