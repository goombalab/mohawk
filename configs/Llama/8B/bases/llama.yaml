ComponentsConfig:
  name: LayeredMambaLM
  input: {vocab_size: 128256, tie_embeddings: false, pad_vocab_size_multiple: 8, lm_head_bias: false}
  MixerModel:
    name: LlamaModel
    input: {d_model: 4096, n_layer: 32, lm_head_prenorm: rms}
    Blocks:
    - Block:
      n_layers: 32
      name: LlamaBlock    
      input: {resid_dropout: 0.0, mlp_intermediate_size: 14336, mlp_act_fn: 'silu'}
      Layer:
        name: LlamaAttention
        input: {
          "flash_attention": true, "hidden_size": "${ComponentsConfig.MixerModel.input.d_model}",
          "rope_scaling": {"factor": 8.0, "low_freq_factor": 1.0, "high_freq_factor": 4.0, "original_max_position_embeddings": 8192, "rope_type": "llama3"},
          "rope_theta": 500000.0, "max_position_embeddings": 131072, "num_attention_heads": 32, "num_hidden_layers": 32, "num_key_value_heads": 8,
        }
      





