LOAD:
  - configs/smoke/tiny_cpu_hstates.yaml

ManagementConfig:
  paths:
    base_dir: /tmp/mohawk_tiny_bfloat16_hstates_cpu_run
    save_dir: /tmp/mohawk_tiny_bfloat16_hstates_cpu_run/save
    tmp_dir: /tmp/mohawk_tiny_bfloat16_hstates_cpu_run/tmp
  env_vars:
    TORCH_HOME: /tmp/mohawk_tiny_bfloat16_hstates_cpu_run/torch_home
    HF_DATASETS_CACHE: /tmp/mohawk_tiny_bfloat16_hstates_cpu_run/huggingface/datasets
    HF_HUB_CACHE: /tmp/mohawk_tiny_bfloat16_hstates_cpu_run/huggingface/hub

DistillConfig:
  name: Tiny-CPU-BFloat16-HStates-Smoke

TrainConfig:
  mixed_precision: true
  model_dtype: bfloat16

TeacherConfig:
  mixed_precision: true
  model_dtype: bfloat16
