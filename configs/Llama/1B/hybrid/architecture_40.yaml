        input: ${SSM_INPUT}
      attn_layer:
        name: LlamaAttention
        input:
          num_attention_heads: 4
          attention_bias: ${ATTN_BIAS}
          head_dim: 64
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072
          

    ###############################################################################
    #  L5  – heads = [1, 4, 5, 13, 17, 18, 27, 31]  → 8
    ###############################################################################
    - name: ${BLOCK_NAME}
