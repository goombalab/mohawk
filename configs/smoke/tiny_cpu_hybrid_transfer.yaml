ManagementConfig:
  wandb:
    project: "mohawk"
    entity: "your-wandb-entity"
    save_code: false
    mode: disabled
  paths:
    base_dir: /tmp/mohawk_tiny_hybrid_transfer_cpu_run
    save_dir: /tmp/mohawk_tiny_hybrid_transfer_cpu_run/save
    tmp_dir: /tmp/mohawk_tiny_hybrid_transfer_cpu_run/tmp
  env_vars:
    WANDB_MODE: disabled
    WANDB_DIR: /tmp/wandb
    TORCH_HOME: /tmp/mohawk_tiny_hybrid_transfer_cpu_run/torch_home
    HF_DATASETS_CACHE: /tmp/mohawk_tiny_hybrid_transfer_cpu_run/huggingface/datasets
    HF_HUB_CACHE: /tmp/mohawk_tiny_hybrid_transfer_cpu_run/huggingface/hub
    MODEL_OFFLOAD_DIR: /tmp/mohawk_tiny_hybrid_transfer_cpu_run/offload
    HF_TOKEN: ""
    LOGURU_LEVEL: DEBUG
    NCCL_DEBUG: INFO

DistillConfig:
  name: Tiny-CPU-Hybrid-Transfer-Smoke
  type: supervised
  temperature: 1.0

ComponentsConfig:
  name: LayeredMambaLM
  input:
    vocab_size: 32000
    pad_vocab_size_multiple: 1
    tie_embeddings: false
    lm_head_bias: false
  MixerModel:
    name: LlamaModel
    input:
      input_size: 32000
      n_layer: 1
      d_model: 16
      norm_epsilon: 1.0e-5
      num_attention_heads: 4
      num_key_value_heads: 4
      head_dim: 4
      max_position_embeddings: 32
      rope_theta: 10000.0
      attention_bias: false
      attention_dropout: 0.0
      _attn_implementation: eager
    Blocks:
      - name: DoubleBlockAdapter
        n_layers: 1
        input:
          resid_dropout: 0.0
          mlp_intermediate_size: 64
          mlp_act_fn: silu
        ssm_layer:
          name: LlamaAttention
          input:
            headdim: 4
            n_v_heads: 4
            num_attention_heads: 4
            num_key_value_heads: 4
            head_dim: 4
            max_position_embeddings: 32
            rope_theta: 10000.0
            attention_bias: false
            attention_dropout: 0.0
            _attn_implementation: eager
        attn_layer:
          name: LlamaAttention
          input:
            num_attention_heads: 1
            num_key_value_heads: 1
            head_dim: 4
            max_position_embeddings: 32
            rope_theta: 10000.0
            attention_bias: false
            attention_dropout: 0.0
            _attn_implementation: eager

TrainConfig:
  seed: 0
  activation_checkpointing: false
  mixed_precision: false
  compile_model: false
  model_dtype: float32
  sharding_strategy: NO_SHARD
  effective_batch_size: 1
  n_tokens: 16
  init_fn: eager
  tokenizer: hf-internal-testing/tiny-random-LlamaForCausalLM

TeacherConfig:
  dir: hf-internal-testing/tiny-random-LlamaForCausalLM
  activation_checkpointing: false
  mixed_precision: false
  compile_model: false
  model_dtype: float32
  sharding_strategy: NO_SHARD
  attn_implementation: eager

LoadConfig: {}

OptimizerConfig:
  optimizer: AdamW
  lr: 1.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.0
  optimize_weights:
    black_list: null
    white_list: null
  scheduler:
    name: constant
    warmup_steps: 0
    decay_steps: 0
    warmup_start_lr: 0.0
    min_lr: 0.0

TrainDataConfig: null
EvalConfig: null
