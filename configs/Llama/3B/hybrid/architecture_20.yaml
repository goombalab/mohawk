# 5 = [14] -> 1
# 8 = [8] -> 1
# 12 = [1, 2] -> 2
# 13 = [5, 17, 23] -> 3
# 14 = [6, 7] -> 2
# 15 = [18] -> 1


ARCH_NAME: Hybrid-3B-ARCH20
ROPE_INPUT: {
  factor: !!float 8,
  low_freq_factor: !!float 1,
  high_freq_factor: !!float 4,
  original_max_position_embeddings: 8192,
  rope_type: llama3,
  }

  
# ---------------------------------------------------------------------------
# Chosen attention heads (cumulative list from both rounds)
# ---------------------------------------------------------------------------
#  0  = [4]                       -> 1
#  3  = [18]                      -> 1
#  5  = [14, 22]                 -> 2
#  7  = [16]                      -> 1
#  8  = [8]                       -> 1
#  9  = [1, 18, 23]              -> 3
# 10  = [3, 11, 17]              -> 3
# 11  = [9, 10]                   -> 2
# 12  = [0, 1, 2, 8, 13, 23]     -> 6
# 13  = [5, 16, 17, 23]          -> 4
# 14  = [0, 6, 7]                -> 3
# 15  = [18, 20]                 -> 2
# 16  = [15]                      -> 1
# 19  = [7]                       -> 1
# ---------------------------------------------------------------------------

