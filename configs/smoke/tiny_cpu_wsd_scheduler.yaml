LOAD:
  - configs/smoke/tiny_cpu_supervised.yaml

ManagementConfig:
  paths:
    base_dir: /tmp/mohawk_tiny_wsd_scheduler_cpu_run
    save_dir: /tmp/mohawk_tiny_wsd_scheduler_cpu_run/save
    tmp_dir: /tmp/mohawk_tiny_wsd_scheduler_cpu_run/tmp
  env_vars:
    TORCH_HOME: /tmp/mohawk_tiny_wsd_scheduler_cpu_run/torch_home
    HF_DATASETS_CACHE: /tmp/mohawk_tiny_wsd_scheduler_cpu_run/huggingface/datasets
    HF_HUB_CACHE: /tmp/mohawk_tiny_wsd_scheduler_cpu_run/huggingface/hub

DistillConfig:
  name: Tiny-CPU-WSD-Scheduler-Smoke

TrainConfig:
  n_tokens: 32

OptimizerConfig:
  scheduler:
    name: wsd
    warmup_steps: 0.25
    decay_steps: 0.25
    warmup_start_lr: 0.0
    min_lr: 0.0
