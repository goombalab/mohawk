LOAD:
  - configs/smoke/tiny_cpu_supervised.yaml

ManagementConfig:
  paths:
    base_dir: /tmp/mohawk_tiny_conversation_collate_cpu_run
    save_dir: /tmp/mohawk_tiny_conversation_collate_cpu_run/save
    tmp_dir: /tmp/mohawk_tiny_conversation_collate_cpu_run/tmp
  env_vars:
    TORCH_HOME: /tmp/mohawk_tiny_conversation_collate_cpu_run/torch_home
    HF_DATASETS_CACHE: /tmp/mohawk_tiny_conversation_collate_cpu_run/huggingface/datasets
    HF_HUB_CACHE: /tmp/mohawk_tiny_conversation_collate_cpu_run/huggingface/hub

DistillConfig:
  name: Tiny-CPU-Conversation-Collate-Smoke

TrainDataConfig:
  JSONIterableDataset:
    data_dir: configs/smoke/data_conversation
  Tokenize:
    tokenizer: sshleifer/tiny-gpt2
    collate_type: conversation
    chat_template: configs/smoke/tiny_chat_template.jinja
    add_generation_prompt: false
    local_files_only: true
