LOAD:
  - configs/smoke/tiny_cpu_supervised.yaml

ManagementConfig:
  paths:
    base_dir: /tmp/mohawk_tiny_random_data_cpu_run
    save_dir: /tmp/mohawk_tiny_random_data_cpu_run/save
    tmp_dir: /tmp/mohawk_tiny_random_data_cpu_run/tmp
  env_vars:
    TORCH_HOME: /tmp/mohawk_tiny_random_data_cpu_run/torch_home
    HF_DATASETS_CACHE: /tmp/mohawk_tiny_random_data_cpu_run/huggingface/datasets
    HF_HUB_CACHE: /tmp/mohawk_tiny_random_data_cpu_run/huggingface/hub

DistillConfig:
  name: Tiny-CPU-RandomDataLoader-Smoke

TrainConfig:
  n_tokens: 16

TrainDataConfig:
  loaders: [null, RandomDataLoader, CycleDataLoader]
  RandomDataLoader:
    data_cfg:
      tokenizer: sshleifer/tiny-gpt2
      local_files_only: true
      max_seq_len: 8
      train:
        n_tokens: 16
        batch_size: 1
  CycleDataLoader: {}
  TorchDataLoader:
    batch_size: 1
    num_workers: 0
