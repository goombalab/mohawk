LOAD: 
# - ./configs/Falcon/7B/bases/load.yaml
- ./configs/Falcon/7B/bases/teacher.yaml
- ./configs/Falcon/7B/bases/optimizer.yaml
- ./configs/Falcon/7B/bases/train.yaml
- ./configs/management.yaml

DistillConfig:
  type: supervised

OptimizerConfig:
  lr: 1.0e-06

TrainConfig:
  n_tokens: !!float 4e9

TrainDataConfig:
  loaders: [RoundRobinLoader, PackingDataLoader, CycleDataLoader, TorchDataLoader]
  RoundRobinLoader:
    train_data_configs:
    # - !load_yaml ./configs/data/fineweb_edu.yaml
    - !load_yaml ./configs/data/open_hermes_2.5.yaml
  PackingDataLoader:
    max_seq_len: 2048
  CycleDataLoader:
    num_cycles: !!float inf
  TorchDataLoader:
    num_workers: 0
    batch_size: 4 #8


EvalConfig:

- Evaluation: benchmark
  frequency: 1000
  batch_size: 16
  max_length: 2048
  mixed_precision: true
  eval_at_start: true
  eval_at_end: true
  tokenizer: ${TrainConfig.tokenizer}
  tasks: ["arc_challenge", "arc_easy", "hellaswag", "piqa", "winogrande", "openbookqa", "lambada_openai", "mmlu"] #, "storycloze", "ifeval", "okapi"]
  enable_tqdm: false
  save_latest: true

- Evaluation: benchmark
  frequency: 1000
  batch_size: 8
  num_fewshot: 5
  max_length: 2048
  eval_at_start: true
  eval_at_end: true
  tokenizer: ${TrainConfig.tokenizer}
  tasks: ["arc_challenge", "arc_easy", "hellaswag", "piqa", "winogrande", "openbookqa", "lambada_openai", "mmlu"] ##, "ifeval", "okapi"]
  enable_tqdm: false
  save_latest: false
