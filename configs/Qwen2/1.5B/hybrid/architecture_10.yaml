          num_attention_heads: 0   # L14
          attention_bias: ${ATTN_BIAS}
          head_dim: 128
          _attn_implementation: flash_attention_2
          rope_theta: 1000000
          max_position_embeddings: 32768

    # L15: 1 head (head 10)
    - name: ${BLOCK_NAME}
      n_layers: 1
      input: ${BLOCK_INPUT}
      ssm_layer:
        name: ${SSM_MIXER}
        input: ${SSM_INPUT}
      attn_layer:
        name: Qwen2Attention
