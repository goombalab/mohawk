ARCH_NAME: Hybrid-Qwen2-1.5B-ARCH20

# (layer_idx, head_idx) for first 20 heads:
# 13 4
# 18 0
# 16 3
# 16 6
# 22 7
# 18 1
# 16 1
# 17 2
# 21 11
# 15 10
# 18 5
# 17 5
# 26 9
# 15 7
# 14 2
# 16 2
# 14 10
# 11 9
# 8  9
# 13 5

ComponentsConfig:
  name: LayeredMambaLM
  input: {vocab_size: 151936, tie_embeddings: true, pad_vocab_size_multiple: 8, lm_head_bias: false}
  MixerModel:
    name: Qwen2Model
    input: {d_model: 1536, n_layer: 28, lm_head_prenorm: rms, norm_epsilon: !!float 1e-6, max_position_embeddings: 32768, rope_theta: 1000000, head_dim: 128}
    Blocks:

    # L0–L7: 0 heads
    - name: ${BLOCK_NAME}
      n_layers: 8
      input: ${BLOCK_INPUT}
      ssm_layer:
        name: ${SSM_MIXER}
        input: ${SSM_INPUT}
      attn_layer:
        name: Qwen2Attention
        input:
          num_attention_heads: 0   # L0-L7

    # L8: 1 head -> {9}
    - name: ${BLOCK_NAME}
      n_layers: 1
      input: ${BLOCK_INPUT}
      ssm_layer:
        name: ${SSM_MIXER}
        input: ${SSM_INPUT}
      attn_layer:
        name: Qwen2Attention
        input:
          num_attention_heads: 1   # L8 (head 9)
          num_key_value_heads: 1
          attention_bias: ${ATTN_BIAS}
          head_dim: 128
          _attn_implementation: flash_attention_2
          rope_theta: 1000000
          max_position_embeddings: 32768

    # L9–L10: 0 heads
    - name: ${BLOCK_NAME}
      n_layers: 2
      input: ${BLOCK_INPUT}
      ssm_layer:
        name: ${SSM_MIXER}
        input: ${SSM_INPUT}
      attn_layer:
        name: Qwen2Attention
        input:
          num_attention_heads: 0   # L9-L10

    # L11: 1 head -> {9}
