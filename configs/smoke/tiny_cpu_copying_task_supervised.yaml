LOAD:
  - configs/smoke/tiny_cpu_supervised.yaml

ManagementConfig:
  paths:
    base_dir: /tmp/mohawk_tiny_copying_task_cpu_run
    save_dir: /tmp/mohawk_tiny_copying_task_cpu_run/save
    tmp_dir: /tmp/mohawk_tiny_copying_task_cpu_run/tmp
  env_vars:
    TORCH_HOME: /tmp/mohawk_tiny_copying_task_cpu_run/torch_home
    HF_DATASETS_CACHE: /tmp/mohawk_tiny_copying_task_cpu_run/huggingface/datasets
    HF_HUB_CACHE: /tmp/mohawk_tiny_copying_task_cpu_run/huggingface/hub

DistillConfig:
  name: Tiny-CPU-CopyingTask-Dataset-Smoke

TrainConfig:
  n_tokens: 48

TrainDataConfig:
  loaders: [null, CopyingTaskDataset, CycleDataLoader, TorchDataLoader]
  CopyingTaskDataset:
    tokenizer_name: sshleifer/tiny-gpt2
    local_files_only: true
    max_seq_len: 24
  CycleDataLoader: {}
  TorchDataLoader:
    batch_size: 1
    num_workers: 0
