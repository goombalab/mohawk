LOAD: 
# - ./configs/Qwen2/1.5B/bases/load.yaml
- ./configs/Qwen2/1.5B/bases/teacher.yaml
- ./configs/Qwen2/1.5B/bases/optimizer.yaml
- ./configs/Qwen2/1.5B/bases/train.yaml
- ./configs/management.yaml

DistillConfig:
  type: supervised

OptimizerConfig:
  lr: 1.0e-05

TrainConfig:
  n_tokens: !!float 2e10

TrainDataConfig:
  loaders: [RoundRobinLoader, PackingDataLoader, CycleDataLoader, TorchDataLoader]
  RoundRobinLoader:
    train_data_configs:
    # - !load_yaml ./configs/data/finemath.yaml
    - !load_yaml ./configs/data/MetaMathQA.yaml
  PackingDataLoader:
    max_seq_len: 2048
  CycleDataLoader:
    num_cycles: !!float inf
  TorchDataLoader:
    num_workers: 0
    batch_size: 8


EvalConfig:

- Evaluation: benchmark
  frequency: 1000
  batch_size: 32
  max_length: 2048
  # limit: 10
  mixed_precision: true
  eval_at_start: true
  eval_at_end: true
  tokenizer: ${TrainConfig.tokenizer}
  tasks: ["hendrycks_math"]
  enable_tqdm: false
  save_latest: true

- Evaluation: eval_ppl
  frequency: 1000
  mixed_precision: true
  eval_at_start: true
  eval_at_end: true
  save_latest: false
  n_batches: 200
  DataConfig:
    loaders: [RoundRobinLoader, PaddingDataLoader, TorchDataLoader]
    RoundRobinLoader:
      train_data_configs:
        - !load_yaml ./configs/data/c4.yaml
    PaddingDataLoader:
      max_seq_len: 2048
    TorchDataLoader:
      num_workers: 0
      batch_size: 8
