LOAD:
  - configs/smoke/tiny_cpu_supervised.yaml

ManagementConfig:
  paths:
    base_dir: /tmp/mohawk_tiny_kv_raw_packing_cpu_run
    save_dir: /tmp/mohawk_tiny_kv_raw_packing_cpu_run/save
    tmp_dir: /tmp/mohawk_tiny_kv_raw_packing_cpu_run/tmp
  env_vars:
    TORCH_HOME: /tmp/mohawk_tiny_kv_raw_packing_cpu_run/torch_home
    HF_DATASETS_CACHE: /tmp/mohawk_tiny_kv_raw_packing_cpu_run/huggingface/datasets
    HF_HUB_CACHE: /tmp/mohawk_tiny_kv_raw_packing_cpu_run/huggingface/hub

DistillConfig:
  name: Tiny-CPU-KV-Raw-Packing-Smoke

TrainDataConfig:
  loaders: [null, RoundRobinLoader, PackingDataLoader, CycleDataLoader, TorchDataLoader]
  RoundRobinLoader:
    train_data_configs:
      - TrainDataConfig:
          loaders: [KVRetrieval, Tokenize]
          KVRetrieval:
            num_pairs: 1
            seed: 0
          Tokenize:
            tokenizer: sshleifer/tiny-gpt2
            collate_type: raw
            local_files_only: true
  PackingDataLoader:
    max_seq_len: 8
  CycleDataLoader: {}
  TorchDataLoader:
    batch_size: 1
    num_workers: 0
