


LoadConfig:
  model:
      # Load the teacher model into pure mamba
    - path: meta-llama/Llama-3.1-8B-Instruct
      strict: false
      allow_missing_keys: true # mixer keys are missing
      allow_unexpected_keys: false # all keys from the teacher model are expected
      rename: {
        # order matters
        'model.': 'backbone.', 
        'self_attn.': 'mixer.self_attn.', 
        'module.': '',
        'embed_tokens.': 'embedding.',
        '.norm.': '.final_layernorm.',
        }
      black_list: []
      white_list: [
        lm_head,
        embedding,
        # self_attn,
        mlp,
        input_layernorm,
        post_attention_layernorm,
        final_layernorm,
      ]
