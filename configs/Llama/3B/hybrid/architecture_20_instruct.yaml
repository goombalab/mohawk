      attn_layer:
        name: LlamaAttention
        input:
          num_attention_heads: 0
          head_dim: 128
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072
          rope_scaling: ${ROPE_INPUT}

    # ----- Layers 5-6 (shared) ---------------------------------------------
    - name: ${BLOCK_NAME}             # layers-5-6
      n_layers: 2
