LOAD:
  - configs/smoke/tiny_cpu_supervised.yaml

ManagementConfig:
  paths:
    base_dir: /tmp/mohawk_tiny_niah_dataset_cpu_run
    save_dir: /tmp/mohawk_tiny_niah_dataset_cpu_run/save
    tmp_dir: /tmp/mohawk_tiny_niah_dataset_cpu_run/tmp
  env_vars:
    TORCH_HOME: /tmp/mohawk_tiny_niah_dataset_cpu_run/torch_home
    HF_DATASETS_CACHE: /tmp/mohawk_tiny_niah_dataset_cpu_run/huggingface/datasets
    HF_HUB_CACHE: /tmp/mohawk_tiny_niah_dataset_cpu_run/huggingface/hub

DistillConfig:
  name: Tiny-CPU-NIAH-Dataset-Smoke

TrainConfig:
  n_tokens: 192

TrainDataConfig:
  loaders: [null, NeedleInHaystackDataset, CycleDataLoader, TorchDataLoader]
  NeedleInHaystackDataset:
    tokenizer_name: sshleifer/tiny-gpt2
    local_files_only: true
    max_seq_len: 96
    tokens_to_generate: 2
    type_haystack: none
    type_needle_k: words
    type_needle_v: numbers
    num_needle_k: 1
    num_needle_v: 1
    num_needle_q: 1
    random_seed: 7
    remove_newline_tab: true
  CycleDataLoader: {}
  TorchDataLoader:
    batch_size: 1
    num_workers: 0
