
LOAD:
# - ./configs/Llama/1B/bases/_hstates.yaml
# - ./configs/Llama/1B/bases/_supervised.yaml
- ./configs/Llama/1B/bases/_post_supervised.yaml

DistillConfig:
  name: ${ARCH_NAME}

TeacherConfig:
  dir: meta-llama/Llama-3.1-8B-Instruct
  model_dtype: bfloat16
  mixed_precision: false
TrainDataConfig:
  TorchDataLoader:
    batch_size: 2

BLOCK_INPUT: {resid_dropout: 0.0, mlp_intermediate_size: 8192, mlp_act_fn: 'silu', norm_epsilon: !!float 1e-5}

SSM_INPUT: {
  use_ref_impl: false,
  d_state: 64, n_qk_heads: 32, n_v_heads: 32, expand: 1, chunk_size: 128, headdim: 64, 
  activation: identity, bias: true, norm_cls: none,
  initializer: {z: default, a_log: default, x: default, B: default, C: default, D: default, out: default, convolution: identity}
  }


LoadConfig:
  model:
    - null # ignore previous LoadConfig.model entries
    - path: <path-to-checkpoint>  # Replace with your checkpoint path
      allow_missing_keys: false
      allow_unexpected_keys: false






########################################################
################### ARCHITECTURE 5 #####################
########################################################


ARCH_NAME: Hybrid-Llama3.2-1B-ARCH5
ROPE_SCALING: {
  factor: !!float 8,
  low_freq_factor: !!float 1,
  high_freq_factor: !!float 4,
  original_max_position_embeddings: 8192,
  rope_type: llama3,
  }

ComponentsConfig:
  name: LayeredMambaLM
  input: {vocab_size: 128256, tie_embeddings: true, pad_vocab_size_multiple: 8, lm_head_bias: false}
  MixerModel:
    name: LlamaModel
    input:
      d_model: 2048
      n_layer: 16
      lm_head_prenorm: rms
      norm_epsilon: !!float 1e-5
      rope_scaling: ${ROPE_SCALING}
      rope_theta: 500000.0
      max_position_embeddings: 131072
    Blocks:
    - name: DoubleBlockAdapter
      n_layers: 1
      input: ${BLOCK_INPUT}
      ssm_layer:
        name: DiscreteMamba2
        input: ${SSM_INPUT}
      attn_layer:
        name: LlamaAttention
        input:
          num_attention_heads: 1 # L0
          attention_bias: false
          head_dim: 64
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072
          
    - name: DoubleBlockAdapter
      n_layers: 3
      input: ${BLOCK_INPUT}
      ssm_layer:
        name: DiscreteMamba2
        input: ${SSM_INPUT}
      attn_layer:
        name: LlamaAttention
        input:
          num_attention_heads: 0 # L1-L3  
          attention_bias: false
          head_dim: 64
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072
          
    - name: DoubleBlockAdapter
      n_layers: 1
      input: ${BLOCK_INPUT}
      ssm_layer:
        name: DiscreteMamba2
        input: ${SSM_INPUT}
      attn_layer:
        name: LlamaAttention
        input:
          num_attention_heads: 1 # L4
          attention_bias: false
          head_dim: 64
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072
          
    - name: DoubleBlockAdapter
      n_layers: 3
      input: ${BLOCK_INPUT}
      ssm_layer:
        name: DiscreteMamba2
        input: ${SSM_INPUT}
      attn_layer:
        name: LlamaAttention
        input:
          num_attention_heads: 0 # L5-L7
          attention_bias: false
          head_dim: 64
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072
          
    - name: DoubleBlockAdapter
      n_layers: 1
      input: ${BLOCK_INPUT}
      ssm_layer:
        name: DiscreteMamba2
        input: ${SSM_INPUT}
      attn_layer:
        name: LlamaAttention
        input:
          num_attention_heads: 1 # L8
          attention_bias: false
          head_dim: 64
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072
          
    - name: DoubleBlockAdapter
      n_layers: 1
      input: ${BLOCK_INPUT}
      ssm_layer:
        name: DiscreteMamba2
        input: ${SSM_INPUT}
      attn_layer:
        name: LlamaAttention
        input:
          num_attention_heads: 1 # L9
          attention_bias: false
          head_dim: 64
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072
          
    - name: DoubleBlockAdapter
      n_layers: 1
      input: ${BLOCK_INPUT}
      ssm_layer:
        name: DiscreteMamba2
        input: ${SSM_INPUT}
      attn_layer:
        name: LlamaAttention
        input:
          num_attention_heads: 1 # L10
          attention_bias: false
          head_dim: 64
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072
          
    - name: DoubleBlockAdapter
