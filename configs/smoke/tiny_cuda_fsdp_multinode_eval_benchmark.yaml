LOAD:
  - configs/smoke/tiny_cuda_fsdp_multinode_gradient_accumulation.yaml

ManagementConfig:
  paths:
    base_dir: /home/abick/mohawk/artifacts/gpu_smoke/tiny_cuda_fsdp_multinode_eval_benchmark
    save_dir: /home/abick/mohawk/artifacts/gpu_smoke/tiny_cuda_fsdp_multinode_eval_benchmark/save
    tmp_dir: /home/abick/mohawk/artifacts/gpu_smoke/tiny_cuda_fsdp_multinode_eval_benchmark/tmp
  env_vars:
    WANDB_MODE: disabled
    WANDB_DIR: /home/abick/mohawk/artifacts/gpu_smoke/wandb
    TORCH_HOME: /home/abick/mohawk/artifacts/gpu_smoke/tiny_cuda_fsdp_multinode_eval_benchmark/torch_home
    HF_DATASETS_CACHE: /home/abick/mohawk/artifacts/gpu_smoke/lm_eval_datasets
    HF_HUB_CACHE: /home/abick/.cache/huggingface/hub

DistillConfig:
  name: Tiny-CUDA-FSDP-Multinode-Eval-Benchmark-Smoke

EvalConfig:
  - Evaluation: benchmark
    frequency: .inf
    eval_at_start: true
    eval_at_end: false
    save_latest: false
    tokenizer: sshleifer/tiny-gpt2
    tasks: [wikitext]
    batch_size: 1
    max_length: 32
    limit: 4
    enable_tqdm: false
    log_samples: false
    distributed: true
    local_files_only: true
    device: cuda
