LOAD:
# - ./configs/Falcon/7B/bases/_supervised.yaml
- ./configs/Falcon/7B/bases/_post_supervised.yaml
- ./configs/Falcon/7B/bases/falcon.yaml

DistillConfig:
  name: pure_3B_C4
  teacher_model: ${TeacherConfig.dir}

OptimizerConfig:
  lr: 1.0e-07


TrainDataConfig:
  loaders: [RoundRobinLoader, PackingDataLoader, TorchDataLoader]
  RoundRobinLoader:
    ratio: [5, 1]
    train_data_configs:
    - !load_yaml ./configs/data/c4.yaml
    - !load_yaml ./configs/data/kv_retrieval.yaml
  PackingDataLoader:
    max_seq_len: 2048
  TorchDataLoader:
    num_workers: 0
    batch_size: 8

LoadConfig:
  model:
    - path: <path-to-checkpoint>  # Replace with your checkpoint path
