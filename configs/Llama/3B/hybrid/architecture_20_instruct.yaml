        name: ${SSM_MIXER}
        input: ${SSM_INPUT}
      attn_layer:
        name: LlamaAttention
        input:
          num_attention_heads: 0
          head_dim: 128
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072
          rope_scaling: ${ROPE_INPUT}

    - name: ${BLOCK_NAME}             # layer-3
      n_layers: 1
      input: {resid_dropout: 0.0, mlp_intermediate_size: 8192, mlp_act_fn: silu}
      ssm_layer:
        name: ${SSM_MIXER}
        input: ${SSM_INPUT}
      attn_layer:
        name: LlamaAttention
        input:
          num_attention_heads: 1      # 3 = [18]
          attention_bias: false
          head_dim: 128
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072
          rope_scaling: ${ROPE_INPUT}

    - name: ${BLOCK_NAME}             # layer-4
      n_layers: 1
      input: {resid_dropout: 0.0, mlp_intermediate_size: 8192, mlp_act_fn: silu}
      ssm_layer:
