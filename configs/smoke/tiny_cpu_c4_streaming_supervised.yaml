LOAD:
  - configs/smoke/tiny_cpu_supervised.yaml

ManagementConfig:
  paths:
    base_dir: /tmp/mohawk_tiny_c4_streaming_cpu_run
    save_dir: /tmp/mohawk_tiny_c4_streaming_cpu_run/save
    tmp_dir: /tmp/mohawk_tiny_c4_streaming_cpu_run/tmp
  env_vars:
    TORCH_HOME: /tmp/mohawk_tiny_c4_streaming_cpu_run/torch_home
    HF_DATASETS_CACHE: /tmp/mohawk_tiny_c4_streaming_cpu_run/huggingface/datasets
    HF_HUB_CACHE: /tmp/mohawk_tiny_c4_streaming_cpu_run/huggingface/hub

DistillConfig:
  name: Tiny-CPU-C4-Streaming-Supervised-Smoke

TrainDataConfig:
  loaders: [null, HFDataset, Tokenize, PaddingDataLoader, CycleDataLoader, TorchDataLoader]
  HFDataset:
    path: allenai/c4
    name: en.noclean
    split: train
    streaming: true
    shuffle_buffer_size: 2
  Tokenize:
    tokenizer: sshleifer/tiny-gpt2
    collate_type: text
    local_files_only: true
  PaddingDataLoader:
    max_seq_len: 8
  CycleDataLoader: {}
  TorchDataLoader:
    batch_size: 1
    num_workers: 0
