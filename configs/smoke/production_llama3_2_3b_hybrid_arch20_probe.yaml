LOAD:
  - ./configs/Llama/3B/bases/_supervised.yaml
  - ./configs/Llama/3B/hybrid/architecture_20.yaml

PRODUCTION_NAME: Production-Llama-3.2-3B-ARCH20-Fast-Hybrid-Probe
RUN_DIR: /home/abick/storage/mohawk/artifacts/production_llama3_2_3b_arch20_probe

DistillConfig:
  name: ${PRODUCTION_NAME}
  type: supervised

BLOCK_NAME: DoubleBlockAdapter
SSM_MIXER: DiscreteMamba2
SSM_INPUT:
  use_ref_impl: false
  d_state: 64
  n_qk_heads: 32
  n_v_heads: 32
  expand: 1
  chunk_size: 128
  headdim: 128
  activation: identity
  bias: false
  norm_cls: none
  initializer:
    z: default
    a_log: default
    x: default
    B: default
    C: default
    D: default
    out: default
    convolution: identity
ROPE_SCALING:
  factor: 8.0
  low_freq_factor: 1.0
  high_freq_factor: 4.0
  original_max_position_embeddings: 8192
  rope_type: llama3

ComponentsConfig:
  MixerModel:
    input:
      d_model: 3072
      n_layer: 28
      norm_epsilon: 1.0e-5
      num_attention_heads: 24
      num_key_value_heads: 8
      head_dim: 128
      rope_scaling: ${ROPE_SCALING}
      rope_theta: 500000.0
      max_position_embeddings: 131072

TrainConfig:
  seed: 42
  activation_checkpointing: false
  mixed_precision: false
  compile_model: false
  model_dtype: bfloat16
  sharding_strategy: NO_SHARD
  effective_batch_size: 1
  n_tokens: 256
  init_fn: eager
  tokenizer: meta-llama/Llama-3.2-3B-Instruct
  attn_implementation: eager

TeacherConfig:
  dir: meta-llama/Llama-3.2-3B-Instruct
  activation_checkpointing: false
  mixed_precision: false
  compile_model: false
  model_dtype: bfloat16
  sharding_strategy: NO_SHARD
  attn_implementation: eager

LoadConfig:
  model: [null]

ManagementConfig:
  wandb:
    mode: disabled
    save_code: false
  paths:
    base_dir: ${RUN_DIR}
    save_dir: ${RUN_DIR}/save
    tmp_dir: ${RUN_DIR}/tmp
  env_vars:
    WANDB_MODE: disabled
    WANDB_DIR: /home/abick/storage/mohawk/wandb
    TORCH_HOME: /home/abick/storage/mohawk/torch_home
    TRITON_CACHE_DIR: /home/abick/storage/mohawk/tmp/triton-production-llama3-2-3b
    XDG_CACHE_HOME: /home/abick/storage/mohawk/tmp/xdg-production-llama3-2-3b
    LOGURU_LEVEL: INFO

EvalConfig: null
