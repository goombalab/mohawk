ComponentsConfig:
  name: LayeredMambaLM
  input: {vocab_size: 128256, tie_embeddings: false, pad_vocab_size_multiple: 8, lm_head_bias: false}
  MixerModel:
    name: LlamaModel
    input: {d_model: 3072, n_layer: 28, lm_head_prenorm: rms,}
    Blocks:
    - name: LlamaBlock
      n_layers: 28
      input: {resid_dropout: 0.0, mlp_intermediate_size: 8192, mlp_act_fn: 'silu'}
      Layer:
        name: DiscreteMamba2Rotary
        input: {
          d_state: 96, n_qk_heads: 32, n_v_heads: 32, expand: 1, chunk_size: 128, 
          activation: identity, use_ref_impl: false, bias: false, norm_cls: none,
          initializer: {a_log: default, x: default, B: default, C: default, D: default, z: identity, out: default, convolution: identity},
          rope_scaling: {factor: 32.0, high_freq_factor: 4.0, low_freq_factor: 1.0, original_max_position_embeddings: 8192, rope_type: llama3},
          max_position_embeddings: 131072,
          rope_theta: 500000.0,
          hidden_size: 3072,
          num_attention_heads: 32,
          }
