      attn_layer:
        name:  LlamaAttention
        input:
          num_attention_heads: 1
          attention_bias: false
          head_dim: 64
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072

    ###############################################################################
    #  L12-L15 – no mapped heads → 0
    ###############################################################################
    - name: DoubleBlockAdapter
      n_layers: 4
      input: ${BLOCK_INPUT}
      ssm_layer:
        name: DiscreteMamba2
        input: ${SSM_INPUT}
      attn_layer:
