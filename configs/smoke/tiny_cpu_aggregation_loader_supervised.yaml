LOAD:
  - configs/smoke/tiny_cpu_supervised.yaml

ManagementConfig:
  paths:
    base_dir: /tmp/mohawk_tiny_aggregation_loader_cpu_run
    save_dir: /tmp/mohawk_tiny_aggregation_loader_cpu_run/save
    tmp_dir: /tmp/mohawk_tiny_aggregation_loader_cpu_run/tmp
  env_vars:
    TORCH_HOME: /tmp/mohawk_tiny_aggregation_loader_cpu_run/torch_home
    HF_DATASETS_CACHE: /tmp/mohawk_tiny_aggregation_loader_cpu_run/huggingface/datasets
    HF_HUB_CACHE: /tmp/mohawk_tiny_aggregation_loader_cpu_run/huggingface/hub

DistillConfig:
  name: Tiny-CPU-Aggregation-Loader-Smoke

TrainDataConfig:
  loaders: [null, RoundRobinLoader, PackingDataLoader, AggregationDataLoader, CycleDataLoader, TorchDataLoader]
  RoundRobinLoader:
    train_data_configs:
      - TrainDataConfig:
          loaders: [JSONIterableDataset, Tokenize]
          JSONIterableDataset:
            data_dir: configs/smoke/data_aggregation_a
          Tokenize:
            tokenizer: sshleifer/tiny-gpt2
            collate_type: text
            local_files_only: true
      - TrainDataConfig:
          loaders: [JSONIterableDataset, Tokenize]
          JSONIterableDataset:
            data_dir: configs/smoke/data_aggregation_b
          Tokenize:
            tokenizer: sshleifer/tiny-gpt2
            collate_type: text
            local_files_only: true
  PackingDataLoader:
    max_seq_len: 8
  AggregationDataLoader:
    aggregation_size: 2
  CycleDataLoader: {}
  TorchDataLoader:
    batch_size: 1
    num_workers: 0
