LOAD:
  - configs/smoke/tiny_cpu_bfloat16_mixed_precision_fallback.yaml

ManagementConfig:
  paths:
    base_dir: /tmp/mohawk_tiny_bfloat16_eval_benchmark_cpu_run
    save_dir: /tmp/mohawk_tiny_bfloat16_eval_benchmark_cpu_run/save
    tmp_dir: /tmp/mohawk_tiny_bfloat16_eval_benchmark_cpu_run/tmp
  env_vars:
    TORCH_HOME: /tmp/mohawk_tiny_bfloat16_eval_benchmark_cpu_run/torch_home
    HF_DATASETS_CACHE: /tmp/mohawk_lm_eval_datasets
    HF_HUB_CACHE: /tmp/mohawk_tiny_bfloat16_eval_benchmark_cpu_run/huggingface/hub

DistillConfig:
  name: Tiny-CPU-BFloat16-Eval-Benchmark-Smoke

EvalConfig:
  - Evaluation: benchmark
    frequency: .inf
    eval_at_start: true
    eval_at_end: false
    save_latest: false
    tokenizer: sshleifer/tiny-gpt2
    tasks: [wikitext]
    batch_size: 1
    max_length: 32
    limit: 1
    enable_tqdm: false
    log_samples: false
    distributed: false
    local_files_only: true
    device: cpu
