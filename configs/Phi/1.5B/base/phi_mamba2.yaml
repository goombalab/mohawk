ComponentsConfig:
  name: LayeredMambaLM
  input: {vocab_size: 51200, tie_embeddings: false, pad_vocab_size_multiple: 8, lm_head_bias: true}
  MixerModel:
    name: LlamaModel
    input: {d_model: 2048, n_layer: 24, lm_head_prenorm: layer}
    Blocks:
    - Block:
      name: MambaPhi  
      n_layers: 24  
      input: {resid_dropout: 0.0}
      Layer:
        name: DiscreteMamba2
        input: {
          d_state: 64, n_qk_heads: 32, n_v_heads: 32, expand: 1, chunk_size: 128, 
          activation: identity, use_ref_impl: false, bias: false, norm_cls: none,
          initializer: {a_log: default, x: default, B: default, C: default, D: default, z: identity, out: default, convolution: identity}
          }
