LOAD: 
- ./configs/Llama/3B/bases/load.yaml
- ./configs/Llama/3B/bases/teacher.yaml
- ./configs/Llama/3B/bases/optimizer.yaml
- ./configs/Llama/3B/bases/train.yaml
- ./configs/management.yaml

DistillConfig:
  type: hstates

OptimizerConfig:
  lr: 1.0e-04

TrainConfig:
  n_tokens: !!float 5e9
  init_fn: eager # lazy, eager
  effective_batch_size: 128
  
TrainDataConfig:
  loaders: [RoundRobinLoader, PackingDataLoader, TorchDataLoader]
  RoundRobinLoader:
    # ratio: [9, 1]
    train_data_configs:
    - !load_yaml ./configs/data/fineweb_edu.yaml
    - !load_yaml ./configs/data/finemath.yaml
    # - !load_yaml ./configs/data/the_stack.yaml
  PackingDataLoader:
    max_seq_len: 2048
  TorchDataLoader:
    num_workers: 0
    batch_size: 8

EvalConfig:

- Evaluation: benchmark
  frequency: 1000
  batch_size: 16
  max_length: 4096
  eval_at_start: true
  eval_at_end: true
  tokenizer: ${TrainConfig.tokenizer}
  tasks: ["arc_challenge", "arc_easy", "hellaswag", "piqa", "winogrande", "openbookqa", "lambada_openai", "mmlu"] #, "gsm8k"]
  enable_tqdm: false
  save_latest: true
