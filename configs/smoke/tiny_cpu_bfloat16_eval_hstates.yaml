LOAD:
  - configs/smoke/tiny_cpu_bfloat16_mixed_precision_fallback.yaml

ManagementConfig:
  paths:
    base_dir: /tmp/mohawk_tiny_bfloat16_eval_hstates_cpu_run
    save_dir: /tmp/mohawk_tiny_bfloat16_eval_hstates_cpu_run/save
    tmp_dir: /tmp/mohawk_tiny_bfloat16_eval_hstates_cpu_run/tmp
  env_vars:
    TORCH_HOME: /tmp/mohawk_tiny_bfloat16_eval_hstates_cpu_run/torch_home
    HF_DATASETS_CACHE: /tmp/mohawk_tiny_bfloat16_eval_hstates_cpu_run/huggingface/datasets
    HF_HUB_CACHE: /tmp/mohawk_tiny_bfloat16_eval_hstates_cpu_run/huggingface/hub

DistillConfig:
  name: Tiny-CPU-BFloat16-Eval-HStates-Smoke

TeacherConfig:
  dir: /tmp/mohawk_tiny_eval_hstates_teacher_ckpt

EvalConfig:
  - Evaluation: eval_hstates
    frequency: .inf
    eval_at_start: true
    eval_at_end: true
    save_latest: true
    n_batches: 1
    DataConfig:
      loaders: [JSONIterableDataset, Tokenize, PaddingDataLoader, TorchDataLoader]
      JSONIterableDataset:
        data_dir: configs/smoke/data
      Tokenize:
        tokenizer: sshleifer/tiny-gpt2
        collate_type: text
        local_files_only: true
      PaddingDataLoader:
        max_seq_len: 8
      TorchDataLoader:
        batch_size: 1
        num_workers: 0
