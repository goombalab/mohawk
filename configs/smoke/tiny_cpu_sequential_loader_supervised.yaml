LOAD:
  - configs/smoke/tiny_cpu_supervised.yaml

ManagementConfig:
  paths:
    base_dir: /tmp/mohawk_tiny_sequential_loader_cpu_run
    save_dir: /tmp/mohawk_tiny_sequential_loader_cpu_run/save
    tmp_dir: /tmp/mohawk_tiny_sequential_loader_cpu_run/tmp
  env_vars:
    TORCH_HOME: /tmp/mohawk_tiny_sequential_loader_cpu_run/torch_home
    HF_DATASETS_CACHE: /tmp/mohawk_tiny_sequential_loader_cpu_run/huggingface/datasets
    HF_HUB_CACHE: /tmp/mohawk_tiny_sequential_loader_cpu_run/huggingface/hub

DistillConfig:
  name: Tiny-CPU-Sequential-Loader-Smoke

TrainDataConfig:
  loaders: [null, SequentialLoader, PaddingDataLoader, CycleDataLoader, TorchDataLoader]
  SequentialLoader:
    max_samples: 1
    train_data_configs:
      - TrainDataConfig:
          loaders: [JSONIterableDataset, Tokenize]
          JSONIterableDataset:
            data_dir: configs/smoke/data_sequence_a
          Tokenize:
            tokenizer: sshleifer/tiny-gpt2
            collate_type: text
            local_files_only: true
      - TrainDataConfig:
          loaders: [JSONIterableDataset, Tokenize]
          JSONIterableDataset:
            data_dir: configs/smoke/data_sequence_b
          Tokenize:
            tokenizer: sshleifer/tiny-gpt2
            collate_type: text
            local_files_only: true
  PaddingDataLoader:
    max_seq_len: 8
  CycleDataLoader: {}
  TorchDataLoader:
    batch_size: 1
    num_workers: 0
