# 5 = [14] -> 1
# 8 = [8] -> 1
# 12 = [1, 2] -> 2
# 13 = [5, 17, 23] -> 3
# 14 = [6, 7] -> 2
# 15 = [18] -> 1


ARCH_NAME: Hybrid-3B-ARCH20
ROPE_INPUT: {
  factor: !!float 8,
  low_freq_factor: !!float 1,
  high_freq_factor: !!float 4,
  original_max_position_embeddings: 8192,
  rope_type: llama3,
  }

  
ComponentsConfig:
  name: LayeredMambaLM
  input: {vocab_size: 128256, tie_embeddings: true, pad_vocab_size_multiple: 8, lm_head_bias: false}

  MixerModel:
    name: LlamaModel
    input: {d_model: 3072, n_layer: 28, lm_head_prenorm: rms}

    Blocks:
    # ----- Layers 0-4 -------------------------------------------------------
    - name: ${BLOCK_NAME}             # layer-0
      n_layers: 1
      input: {resid_dropout: 0.0, mlp_intermediate_size: 8192, mlp_act_fn: silu}
      ssm_layer:
        name: ${SSM_MIXER}
        input: ${SSM_INPUT}
      attn_layer:
        name: LlamaAttention
        input:
          num_attention_heads: 1      # 0 = [4]
          attention_bias: false
          head_dim: 128
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072
          rope_scaling: ${ROPE_INPUT}

    - name: ${BLOCK_NAME}             # layer-1
      n_layers: 1
      input: {resid_dropout: 0.0, mlp_intermediate_size: 8192, mlp_act_fn: silu}
      ssm_layer:
        name: ${SSM_MIXER}
        input: ${SSM_INPUT}
      attn_layer:
        name: LlamaAttention
        input:
          num_attention_heads: 0
          head_dim: 128
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072
          rope_scaling: ${ROPE_INPUT}

    - name: ${BLOCK_NAME}             # layer-2
      n_layers: 1
      input: {resid_dropout: 0.0, mlp_intermediate_size: 8192, mlp_act_fn: silu}
