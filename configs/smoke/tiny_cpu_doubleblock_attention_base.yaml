SMOKE_NAME: Tiny-CPU-DoubleBlock-Attention-Smoke
BLOCK_NAME: DoubleBlockAdapter
RUN_DIR: /tmp/mohawk_tiny_doubleblock_attention_cpu_run
TEACHER_DIR: /tmp/mohawk_tiny_doubleblock_attention_teacher_ckpt

ManagementConfig:
  wandb:
    project: "mohawk"
    entity: "your-wandb-entity"
    save_code: false
    mode: disabled
  paths:
    base_dir: ${RUN_DIR}
    save_dir: ${RUN_DIR}/save
    tmp_dir: ${RUN_DIR}/tmp
  env_vars:
    WANDB_MODE: disabled
    WANDB_DIR: /tmp/wandb
    TORCH_HOME: ${RUN_DIR}/torch_home
    HF_DATASETS_CACHE: ${RUN_DIR}/huggingface/datasets
    HF_HUB_CACHE: ${RUN_DIR}/huggingface/hub
    HF_TOKEN: ""
    LOGURU_LEVEL: DEBUG
    NCCL_DEBUG: INFO

DistillConfig:
  name: ${SMOKE_NAME}
  type: supervised
  temperature: 1.0

ComponentsConfig:
  name: LayeredMambaLM
  input:
    vocab_size: 50257
    pad_vocab_size_multiple: 1
    tie_embeddings: false
    lm_head_bias: false
  MixerModel:
    name: LlamaModel
    input:
      input_size: 50257
      n_layer: 1
      d_model: 16
      norm_epsilon: 1.0e-5
      num_attention_heads: 4
      num_key_value_heads: 4
      head_dim: 4
      max_position_embeddings: 32
      rope_theta: 10000.0
      attention_bias: false
      attention_dropout: 0.0
      _attn_implementation: eager
    Blocks:
      - name: ${BLOCK_NAME}
        n_layers: 1
        input:
          resid_dropout: 0.0
          mlp_intermediate_size: 32
          mlp_act_fn: silu
        ssm_layer:
          name: LlamaAttention
          input:
            headdim: 4
            n_v_heads: 4
            num_attention_heads: 4
            num_key_value_heads: 4
            head_dim: 4
            max_position_embeddings: 32
            rope_theta: 10000.0
            attention_bias: false
            attention_dropout: 0.0
            _attn_implementation: eager
        attn_layer:
          name: LlamaAttention
          input:
            num_attention_heads: 1
            num_key_value_heads: 1
            head_dim: 4
            max_position_embeddings: 32
            rope_theta: 10000.0
            attention_bias: false
            attention_dropout: 0.0
            _attn_implementation: eager

TrainConfig:
  seed: 0
  activation_checkpointing: false
  mixed_precision: false
  compile_model: false
  model_dtype: float32
  sharding_strategy: NO_SHARD
  effective_batch_size: 1
  n_tokens: 16
  init_fn: eager
  tokenizer: sshleifer/tiny-gpt2

TeacherConfig:
  dir: ${TEACHER_DIR}
  activation_checkpointing: false
  mixed_precision: false
  compile_model: false
  model_dtype: float32
  sharding_strategy: NO_SHARD
  attn_implementation: eager

LoadConfig: {}

OptimizerConfig:
  optimizer: AdamW
  lr: 1.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.0
  optimize_weights:
    black_list: null
    white_list: null
  scheduler:
    name: constant
    warmup_steps: 0
    decay_steps: 0
    warmup_start_lr: 0.0
    min_lr: 0.0

TrainDataConfig:
  loaders: [JSONIterableDataset, Tokenize, PaddingDataLoader, CycleDataLoader, TorchDataLoader]
  JSONIterableDataset:
    data_dir: configs/smoke/data
  Tokenize:
    tokenizer: sshleifer/tiny-gpt2
    collate_type: text
    local_files_only: true
  PaddingDataLoader:
    max_seq_len: 8
  CycleDataLoader: {}
  TorchDataLoader:
    batch_size: 1
    num_workers: 0

EvalConfig: null
