LOAD:
  - configs/smoke/tiny_cpu_supervised.yaml

ManagementConfig:
  paths:
    base_dir: /tmp/mohawk_tiny_load_model_rename_cpu_run
    save_dir: /tmp/mohawk_tiny_load_model_rename_cpu_run/save
    tmp_dir: /tmp/mohawk_tiny_load_model_rename_cpu_run/tmp
  env_vars:
    TORCH_HOME: /tmp/mohawk_tiny_load_model_rename_cpu_run/torch_home
    HF_DATASETS_CACHE: /tmp/mohawk_tiny_load_model_rename_cpu_run/huggingface/datasets
    HF_HUB_CACHE: /tmp/mohawk_tiny_load_model_rename_cpu_run/huggingface/hub

DistillConfig:
  name: Tiny-CPU-Load-Model-Rename-Smoke

LoadConfig:
  model:
    - path: /tmp/mohawk_tiny_renamed_teacher_ckpt
      rename:
        renamed_lm_head: lm_head
      white_list:
        - lm_head
      black_list: null
      allow_missing_keys: true
      allow_unexpected_keys: false

OptimizerConfig:
  optimize_weights:
    black_list:
      - lm_head
    white_list: null
