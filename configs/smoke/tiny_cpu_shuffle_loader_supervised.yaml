LOAD:
  - configs/smoke/tiny_cpu_supervised.yaml

ManagementConfig:
  paths:
    base_dir: /tmp/mohawk_tiny_shuffle_loader_cpu_run
    save_dir: /tmp/mohawk_tiny_shuffle_loader_cpu_run/save
    tmp_dir: /tmp/mohawk_tiny_shuffle_loader_cpu_run/tmp
  env_vars:
    TORCH_HOME: /tmp/mohawk_tiny_shuffle_loader_cpu_run/torch_home
    HF_DATASETS_CACHE: /tmp/mohawk_tiny_shuffle_loader_cpu_run/huggingface/datasets
    HF_HUB_CACHE: /tmp/mohawk_tiny_shuffle_loader_cpu_run/huggingface/hub

DistillConfig:
  name: Tiny-CPU-ShuffleLoader-Smoke

TrainConfig:
  n_tokens: 16

TrainDataConfig:
  loaders: [null, ShuffleLoader, CycleDataLoader]
  ShuffleLoader:
    data_cfg:
      loaders:
        - configs/smoke/tiny_shuffle_source_a.yaml
        - configs/smoke/tiny_shuffle_source_b.yaml
      batch_size: 1
      max_seq_len: 8
  CycleDataLoader: {}
  TorchDataLoader:
    batch_size: 1
    num_workers: 0
