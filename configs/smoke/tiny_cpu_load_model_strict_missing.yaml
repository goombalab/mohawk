LOAD:
  - configs/smoke/tiny_cpu_supervised.yaml

ManagementConfig:
  paths:
    base_dir: /tmp/mohawk_tiny_load_model_strict_missing_cpu_run
    save_dir: /tmp/mohawk_tiny_load_model_strict_missing_cpu_run/save
    tmp_dir: /tmp/mohawk_tiny_load_model_strict_missing_cpu_run/tmp
  env_vars:
    TORCH_HOME: /tmp/mohawk_tiny_load_model_strict_missing_cpu_run/torch_home
    HF_DATASETS_CACHE: /tmp/mohawk_tiny_load_model_strict_missing_cpu_run/huggingface/datasets
    HF_HUB_CACHE: /tmp/mohawk_tiny_load_model_strict_missing_cpu_run/huggingface/hub

DistillConfig:
  name: Tiny-CPU-Load-Model-Strict-Missing-Smoke

LoadConfig:
  model:
    - path: /tmp/mohawk_tiny_teacher_ckpt
      white_list:
        - lm_head
      black_list: null
      allow_missing_keys: false
      allow_unexpected_keys: false
