# 0 = [4] -> 1
# 3 = [18] -> 1
# 8 = [8] -> 1
# 9 = [1, 18, 21] -> 3
# 10 = [17, 3] -> 2
# 11 = [10, 1] -> 2
# 12 = [1, 13, 8, 0, 12] -> 5
# 13 = [5, 16] -> 2
# 14 = [7, 6, 0] -> 3
# 15 = [18, 20] -> 2
# 19 = [7] -> 1

DistillConfig:
  name: Hybrid-3B-ARCH23

ComponentsConfig:
  name: LayeredMambaLM
  input: {vocab_size: 128256, tie_embeddings: true, pad_vocab_size_multiple: 8, lm_head_bias: false}
  MixerModel:
    name: LlamaModel
    input:
      d_model: 3072
      n_layer: 28
      lm_head_prenorm: rms
      norm_epsilon: !!float 1e-5
      rope_scaling: ${ROPE_SCALING}
      rope_theta: 500000.0
      max_position_embeddings: 131072
    Blocks:
    - name: DoubleBlock
      n_layers: 1
      input: {resid_dropout: 0.0, mlp_intermediate_size: 8192, mlp_act_fn: 'silu'}
      ssm_layer:
        name: DiscreteMamba2
        input: {
          d_state: 64, n_qk_heads: 32, n_v_heads: 32, expand: 1, chunk_size: 128, headdim: 128, 
          activation: identity, use_ref_impl: false, bias: false, norm_cls: none,
          initializer: {a_log: default, x: default, B: default, C: default, D: default, z: identity, out: default, convolution: identity}
          }
      attn_layer:
        name: LlamaAttention
        input:
          num_attention_heads: 1
          head_dim: 128
          _attn_implementation: flash_attention_2
          rope_theta: 500000
          max_position_embeddings: 131072
          rope_scaling:
            factor: !!float 8
            low_freq_factor: !!float 1
            high_freq_factor: !!float 4
            original_max_position_embeddings: 8192
            rope_type: llama3
    - name: DoubleBlock
