LOAD:
  - configs/smoke/tiny_cpu_phi_bfloat16_mixed_precision_fallback.yaml

ManagementConfig:
  paths:
    base_dir: /home/abick/mohawk/artifacts/gpu_smoke/tiny_cuda_ddp_phi_bfloat16_eval_callbacks
    save_dir: /home/abick/mohawk/artifacts/gpu_smoke/tiny_cuda_ddp_phi_bfloat16_eval_callbacks/save
    tmp_dir: /home/abick/mohawk/artifacts/gpu_smoke/tiny_cuda_ddp_phi_bfloat16_eval_callbacks/tmp
  env_vars:
    WANDB_MODE: disabled
    WANDB_DIR: /home/abick/mohawk/artifacts/gpu_smoke/wandb
    TORCH_HOME: /home/abick/mohawk/artifacts/gpu_smoke/tiny_cuda_ddp_phi_bfloat16_eval_callbacks/torch_home
    HF_DATASETS_CACHE: /home/abick/mohawk/artifacts/gpu_smoke/tiny_cuda_ddp_phi_bfloat16_eval_callbacks/huggingface/datasets
    HF_HUB_CACHE: /home/abick/.cache/huggingface/hub

DistillConfig:
  name: Tiny-CUDA-DDP-Phi-BFloat16-Eval-Callbacks-Smoke

TrainConfig:
  wrapper_type: ddp
  effective_batch_size: 2

TeacherConfig:
  dir: /home/abick/mohawk/artifacts/gpu_smoke/tiny_cuda_phi_teacher_ckpt
  wrapper_type: ddp

TrainDataConfig:
  JSONIterableDataset:
    data_dir: configs/smoke/data_ddp

EvalConfig:
  - Evaluation: eval_hstates
    frequency: .inf
    eval_at_start: true
    eval_at_end: true
    save_latest: true
    n_batches: 1
    DataConfig:
      loaders: [JSONIterableDataset, Tokenize, PaddingDataLoader, TorchDataLoader]
      JSONIterableDataset:
        data_dir: configs/smoke/data_ddp
      Tokenize:
        tokenizer: sshleifer/tiny-gpt2
        collate_type: text
        local_files_only: true
      PaddingDataLoader:
        max_seq_len: 8
      TorchDataLoader:
        batch_size: 1
        num_workers: 0
  - Evaluation: eval_ppl
    frequency: .inf
    eval_at_start: true
    eval_at_end: true
    save_latest: true
    n_batches: 1
    DataConfig:
      loaders: [JSONIterableDataset, Tokenize, PaddingDataLoader, TorchDataLoader]
      JSONIterableDataset:
        data_dir: configs/smoke/data_ddp
      Tokenize:
        tokenizer: sshleifer/tiny-gpt2
        collate_type: text
        local_files_only: true
      PaddingDataLoader:
        max_seq_len: 8
      TorchDataLoader:
        batch_size: 1
        num_workers: 0
